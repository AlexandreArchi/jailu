<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="shelf" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#334155"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="book-flying" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="book1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#818cf8"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="book2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
    <linearGradient id="book3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4338ca"/>
    </linearGradient>
    <linearGradient id="book4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#c4b5fd"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <filter id="glow-green" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <clipPath id="rounded">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle grid dots in background -->
  <g opacity="0.04">
    <circle cx="200" cy="200" r="3" fill="#818cf8"/>
    <circle cx="400" cy="200" r="3" fill="#818cf8"/>
    <circle cx="600" cy="200" r="3" fill="#818cf8"/>
    <circle cx="800" cy="200" r="3" fill="#818cf8"/>
    <circle cx="200" cy="400" r="3" fill="#818cf8"/>
    <circle cx="400" cy="400" r="3" fill="#818cf8"/>
    <circle cx="600" cy="400" r="3" fill="#818cf8"/>
    <circle cx="800" cy="400" r="3" fill="#818cf8"/>
  </g>

  <g clip-path="url(#rounded)">

    <!-- Shelf board -->
    <rect x="130" y="680" width="764" height="28" rx="8" fill="url(#shelf)" filter="url(#shadow)"/>

    <!-- Book 1 — large indigo -->
    <rect x="158" y="460" width="82" height="220" rx="6" fill="url(#book1)" filter="url(#shadow)"/>
    <!-- Book 1 highlight -->
    <rect x="170" y="472" width="12" height="196" rx="3" fill="rgba(255,255,255,0.15)"/>

    <!-- Book 2 — tall violet -->
    <rect x="256" y="420" width="66" height="260" rx="6" fill="url(#book2)" filter="url(#shadow)"/>
    <rect x="267" y="432" width="10" height="236" rx="3" fill="rgba(255,255,255,0.12)"/>

    <!-- Book 3 — medium indigo dark -->
    <rect x="338" y="480" width="74" height="200" rx="6" fill="url(#book3)" filter="url(#shadow)"/>
    <rect x="349" y="492" width="10" height="176" rx="3" fill="rgba(255,255,255,0.10)"/>

    <!-- Gap for the flying book landing spot -->

    <!-- Book 4 — slim lavender -->
    <rect x="620" y="500" width="52" height="180" rx="6" fill="url(#book4)" filter="url(#shadow)"/>
    <rect x="630" y="512" width="8" height="156" rx="3" fill="rgba(255,255,255,0.13)"/>

    <!-- Book 5 — medium indigo -->
    <rect x="688" y="450" width="78" height="230" rx="6" fill="url(#book1)" filter="url(#shadow)"/>
    <rect x="700" y="462" width="11" height="206" rx="3" fill="rgba(255,255,255,0.12)"/>

    <!-- Book 6 — tall violet right -->
    <rect x="782" y="470" width="60" height="210" rx="6" fill="url(#book2)" filter="url(#shadow)"/>
    <rect x="793" y="482" width="9" height="186" rx="3" fill="rgba(255,255,255,0.11)"/>

    <!-- Flying book (green) — slightly rotated, descending into gap -->
    <g transform="translate(512, 390) rotate(-8)" filter="url(#glow-green)">
      <!-- Book body -->
      <rect x="-42" y="-118" width="84" height="220" rx="7" fill="url(#book-flying)"/>
      <!-- Spine highlight -->
      <rect x="-30" y="-106" width="13" height="196" rx="4" fill="rgba(255,255,255,0.25)"/>
      <!-- Page edges (right side) -->
      <rect x="30" y="-110" width="8" height="204" rx="2" fill="rgba(255,255,255,0.12)"/>
      <!-- Tiny motion lines above -->
      <line x1="-20" y1="-128" x2="-20" y2="-148" stroke="#6ee7b7" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
      <line x1="0" y1="-126" x2="0" y2="-150" stroke="#6ee7b7" stroke-width="3" stroke-linecap="round" opacity="0.4"/>
      <line x1="20" y1="-128" x2="20" y2="-144" stroke="#6ee7b7" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
    </g>

    <!-- Glow halo under flying book -->
    <ellipse cx="508" cy="680" rx="70" ry="12" fill="#10b981" opacity="0.18"/>

  </g>
</svg>
