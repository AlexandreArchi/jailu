<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="b1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="b2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="b3" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="b4" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c4b5fd"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="b5" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Shelf -->
  <rect x="112" y="692" width="800" height="32" rx="10" fill="#1e293b"/>
  <rect x="112" y="692" width="800" height="8" rx="4" fill="#334155"/>

  <!-- Book 1 — large indigo (left) -->
  <rect x="148" y="462" width="90" height="230" rx="8" fill="url(#b1)"/>
  <rect x="162" y="474" width="14" height="206" rx="4" fill="rgba(255,255,255,0.18)"/>

  <!-- Book 2 — tall violet -->
  <rect x="252" y="418" width="70" height="274" rx="8" fill="url(#b2)"/>
  <rect x="264" y="430" width="11" height="250" rx="4" fill="rgba(255,255,255,0.15)"/>

  <!-- Book 3 — medium indigo dark -->
  <rect x="336" y="478" width="78" height="214" rx="8" fill="url(#b3)"/>
  <rect x="349" y="490" width="11" height="190" rx="4" fill="rgba(255,255,255,0.12)"/>

  <!-- Gap center — where flying book lands -->

  <!-- Book 4 — slim lavender (right side) -->
  <rect x="600" y="504" width="56" height="188" rx="8" fill="url(#b4)"/>
  <rect x="611" y="516" width="9" height="164" rx="3" fill="rgba(255,255,255,0.14)"/>

  <!-- Book 5 — medium indigo -->
  <rect x="670" y="454" width="84" height="238" rx="8" fill="url(#b1)"/>
  <rect x="684" y="466" width="13" height="214" rx="4" fill="rgba(255,255,255,0.16)"/>

  <!-- Book 6 — tall violet (right) -->
  <rect x="768" y="472" width="66" height="220" rx="8" fill="url(#b2)"/>
  <rect x="780" y="484" width="10" height="196" rx="3" fill="rgba(255,255,255,0.13)"/>

  <!-- Flying book (emerald) — rotated -8deg, descending -->
  <g transform="translate(504 370) rotate(-8)">
    <rect x="-46" y="-126" width="92" height="234" rx="10" fill="url(#b5)"/>
    <rect x="-32" y="-114" width="16" height="210" rx="5" fill="rgba(255,255,255,0.28)"/>
    <rect x="34" y="-118" width="8" height="218" rx="3" fill="rgba(255,255,255,0.10)"/>
  </g>

  <!-- Subtle green glow under flying book -->
  <ellipse cx="500" cy="692" rx="80" ry="14" fill="#10b981" opacity="0.22"/>
</svg>
