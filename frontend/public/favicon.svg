<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>

  <!-- Shelf -->
  <rect x="3" y="22" width="26" height="3" rx="1.5" fill="#334155"/>

  <!-- Book 1 — indigo -->
  <rect x="4" y="11" width="5" height="11" rx="1" fill="#6366f1"/>
  <!-- Book 2 — violet -->
  <rect x="10" y="9" width="4" height="13" rx="1" fill="#7c3aed"/>
  <!-- Book 3 — indigo dark -->
  <rect x="15" y="12" width="4" height="10" rx="1" fill="#4338ca"/>

  <!-- Flying book — emerald, slightly rotated -->
  <g transform="translate(24, 12) rotate(-10)">
    <rect x="-3" y="-6" width="6" height="12" rx="1" fill="#10b981"/>
  </g>
</svg>
